services:
    web:
        image: odoo:16.0      
        command: odoo --log-level=debug
        depends_on:
            - db
        ports:
            - "10020:8069"
        volumes:
            - odoo-web-data:/var/lib/odoo
            - ./etc:/etc/odoo
            - ./addons:/mnt/extra-addons
        # env_file:
        #     - .env
        environment:
            - HOST=db
            - USER=odoo
            - PASSWORD=odoo16@2026
            - DB_HOST=db
            - DB_PORT=5432
            - DB_USER=odoo
            - DB_PASSWORD=odoo16@2026
            - OPENBLAS_NUM_THREADS=4
        restart: always

    db:
        image: postgres:15
        environment:
            - POSTGRES_DB=postgres
            - POSTGRES_PASSWORD=odoo16@2026
            - POSTGRES_USER=odoo
        volumes:
            - odoo-db-data:/var/lib/postgresql/data
        restart: always

volumes:
    odoo-web-data:
    odoo-db-data: